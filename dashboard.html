<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Forever Linked Dashboard</title>

<link rel="stylesheet" href="css/dashboard.css">

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

    <div class="logo">

        Forever Linked

    </div>

    <ul>

        <li class="active">

            <i class="fas fa-house"></i>

            Dashboard

        </li>

        <li>

            <i class="fas fa-calendar"></i>

            Appointments

        </li>

        <li>

            <i class="fas fa-users"></i>

            Customers

        </li>

        <li>

            <i class="fas fa-dollar-sign"></i>

            Sales

        </li>

        <li>

            <i class="fas fa-box"></i>

            Inventory

        </li>

        <li>

            <i class="fas fa-chart-line"></i>

            Reports

        </li>

        <li>

            <i class="fas fa-file-invoice-dollar"></i>

            Expenses

        </li>

        <li>

            <i class="fas fa-gear"></i>

            Settings

        </li>

    </ul>

</div>

<!-- MAIN -->

<div class="main">

    <header>

    <div>

        <h1>Owner Dashboard</h1>

        <p id="todayDate"></p>

    </div>

</header>

    <!-- STAT CARDS -->

   <div class="cards">

    <!-- Today's Sales -->

    <div class="card">

        <h2 id="todaySales">$0</h2>

        <p>Today's Sales</p>

    </div>

    <!-- Monthly Revenue -->

    <div class="card">

        <h2 id="monthSales">$0</h2>

        <p>This Month</p>

    </div>

    <!-- Today's Appointments -->

    <div class="card">

        <h2 id="appointments">0</h2>

        <p>Appointments</p>

    </div>

    <!-- Inventory Alerts -->

    <div class="card">

        <h2 id="inventoryAlerts">0</h2>

        <p>Inventory Alerts</p>

    </div>

</div>

    <!-- RECENT SALES -->

    <div class="panel">

        <h2>

            Recent Sales

        </h2>

        <table>

            <thead>

                <tr>

                    <th>Date</th>

                    <th>Customer</th>

                    <th>Item</th>

                    <th>Total</th>

                </tr>

            </thead>

            <tbody>

                <tr>

                    <td>--</td>

                    <td>--</td>

                    <td>--</td>

                    <td>$0</td>

                </tr>

            </tbody>

        </table>

    </div>

</div>
<script src="js/dashboard.js"></script>
</body>

</html>
